name: Build GameBoost

on:
  workflow_dispatch:
    inputs:
      game_bundle_id:
        description: Bundle ID of the authorized target game
        required: false
        default: com.example.game
        type: string
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rootful-ios12-13-arm64
            package_scheme: rootful
            minimum_ios: "12.0"
            architectures: arm64
            required_architectures: arm64
          - name: rootful-ios14-plus
            package_scheme: rootful
            minimum_ios: "14.0"
            architectures: arm64 arm64e
            required_architectures: arm64 arm64e
          - name: rootless-ios15-plus
            package_scheme: rootless
            minimum_ios: "15.0"
            architectures: arm64 arm64e
            required_architectures: arm64 arm64e

    env:
      GAME_BUNDLE_ID: ${{ inputs.game_bundle_id || vars.GAME_BUNDLE_ID || 'com.example.game' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure Theos path
        shell: bash
        run: |
          set -euo pipefail
          printf 'THEOS=%s\n' "$RUNNER_TEMP/theos" >> "$GITHUB_ENV"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate target Bundle ID
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GAME_BUNDLE_ID" =~ ^[A-Za-z0-9][A-Za-z0-9.-]*$ ]]; then
            echo "Invalid Bundle ID: $GAME_BUNDLE_ID" >&2
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Set :Filter:Bundles:0 $GAME_BUNDLE_ID" GameBoost.plist
          /usr/libexec/PlistBuddy -c "Print :Filter:Bundles:0" GameBoost.plist

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install ldid xz
          git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"

      - name: Build package
        shell: bash
        env:
          BUILD_NAME: ${{ matrix.name }}
          PACKAGE_SCHEME: ${{ matrix.package_scheme }}
          MINIMUM_IOS: ${{ matrix.minimum_ios }}
          ARCHS_TO_BUILD: ${{ matrix.architectures }}
          REQUIRED_ARCHS: ${{ matrix.required_architectures }}
        run: |
          set -euo pipefail
          make clean
          if [[ "$PACKAGE_SCHEME" == "rootless" ]]; then
            make package FINALPACKAGE=1 \
              THEOS_PACKAGE_SCHEME=rootless \
              ARCHS="$ARCHS_TO_BUILD" \
              TARGET="iphone:clang:latest:$MINIMUM_IOS"
          else
            make package FINALPACKAGE=1 \
              ARCHS="$ARCHS_TO_BUILD" \
              TARGET="iphone:clang:latest:$MINIMUM_IOS"
          fi

          mkdir -p "dist/$BUILD_NAME"
          cp packages/*.deb "dist/$BUILD_NAME/"

          dylib_path="$(find .theos/_ -type f -name GameBoost.dylib -print -quit)"
          if [[ -z "$dylib_path" ]]; then
            echo "GameBoost.dylib was not staged" >&2
            exit 1
          fi
          cp "$dylib_path" "dist/$BUILD_NAME/GameBoost.dylib"

          archs="$(lipo -archs "$dylib_path")"
          echo "$archs" | tee "dist/$BUILD_NAME/architectures.txt"
          for required_arch in $REQUIRED_ARCHS; do
            grep -qw "$required_arch" <<<"$archs"
          done

      - name: Upload package and dylib
        uses: actions/upload-artifact@v4
        with:
          name: gameboost-${{ matrix.name }}
          path: dist/${{ matrix.name }}/
          if-no-files-found: error
          retention-days: 14
